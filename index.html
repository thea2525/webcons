<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEBCON</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="grid-bg"></div>

    <header>
      <div class="container">
        <nav>
          <div class="logo">
            <div class="logo-box">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path
                  d="M3 21H21M4 21V10M20 21V10M2 10L12 4L22 10M7 10V21M12 10V21M17 10V21"
                  stroke="white"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>

            <span>WEBCON</span>
          </div>
        </nav>
      </div>
    </header>

    <section class="hero">
      <div class="container hero-content">
        <div class="hero-text">
          <h1>
            Architects Blueprint,
            <span>Version Control</span>
          </h1>

          <p>
            WEBCON tracks revisions of floor plans to ensure that all known
            consultants are working on the latest version.
          </p>
        </div>

        <div class="hero-action">
          <a href="login.html" class="btn-primary hero-btn"> Get Started </a>
        </div>
      </div>
    </section>
  </body>
