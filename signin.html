<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEBCON | Login</title>

    <link rel="stylesheet" href="signin.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <h1>WEBCON</h1>
    <h3>An Architect Blueprint Version Control</h3>

    <div class="logincard">
      <h1 class="title">Sign up</h1>
      <form id="loginForm">
        <div class="login-field">
          <label for="email">Email Address</label>

          <div class="login-input-wrap">
            <i class="fa-regular fa-envelope"></i>

            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
        </div>

        <div class="login-field">
          <label for="password">Password</label>

          <div class="login-input-wrap">
            <i class="fa-solid fa-lock"></i>

            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />

            <button type="button" class="login-eye-toggle" id="togglePassword">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="login-field">
          <label for="role">Authorization Role</label>
          <div class="login-input-wrap login-select-wrap">
            <i class="fa-solid fa-user-group"></i>
            <select id="role" name="role" required>
              <option value="architect" selected>Architect</option>
              <option value="engineering_consultant">
                Engineering Consultant
              </option>
              <option value="project_manager">Project Manager</option>
              <option value="client">Client</option>
              <option value="system_administrator">System Administrator</option>
            </select>
          </div>
        </div>
        <button type="submit" class="primary-button login-submit">
          <i class="fa-solid fa-right-to-bracket"></i>
          <a href="login.html">Authenticate</a>
        </button>
      </form>
    </div>

    <script>
      const togglePassword = document.getElementById("togglePassword");

      const password = document.getElementById("password");

      togglePassword.addEventListener("click", function () {
        if (password.type === "password") {
          password.type = "text";

          this.innerHTML = '<i class="fa-regular fa-eye-slash"></i>';
        } else {
          password.type = "password";

          this.innerHTML = '<i class="fa-regular fa-eye"></i>';
        }
      });

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          window.location.href = "project.html";
        });
    </script>
  </body>
</html>
